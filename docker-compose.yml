services:
  postgres:
    image: postgres:15
    container_name: goldstream_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: goldstream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: goldstream_app
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - .:/app
      
  adminer:
    image: adminer
    container_name: goldstream_adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres_data: